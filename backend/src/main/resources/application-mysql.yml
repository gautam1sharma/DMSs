# Real MySQL — run with: SPRING_PROFILES_ACTIVE=mysql mvn spring-boot:run
# Use 127.0.0.1 to avoid Windows resolving "localhost" to IPv6 when MySQL listens on IPv4 only.
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:sems_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: sems-pool
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
