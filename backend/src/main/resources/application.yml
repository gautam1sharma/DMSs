spring:
  application:
    name: serene-dms

  datasource:
    url: jdbc:mysql://localhost:3310/serene_dms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: SereneHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 50
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

application:
  jwt:
    secret: "serene-dms-super-secret-jwt-key-minimum-256-bits-long-for-hs256-algo"
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  security:
    max-failed-attempts: 5
    cors:
      allowed-origins:
        - "http://localhost:5173"
        - "http://localhost:3000"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: Serene DMS API
    version: v1.0
    description: Dealer Management System REST API for brand Serene

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.serene.dms: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/serene-dms.log
