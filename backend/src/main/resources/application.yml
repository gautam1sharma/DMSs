spring:
  application:
    name: serene-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  error:
    include-message: always

app:
  api:
    base-path: /api/v1
  security:
    login-min-duration-ms: ${LOGIN_MIN_DURATION_MS:200}
  jwt:
    secret: ${JWT_SECRET:Serene2024SecretKeyForJwtSigningMustBe256BitsLongEnough!!}
    expiration-ms: 86400000

logging:
  level:
    root: INFO
    com.serene.sems: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
