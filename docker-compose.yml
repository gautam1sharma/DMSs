# MySQL for Serene — run: docker compose up -d
# Then start the API with MySQL profile, e.g. PowerShell:
#   $env:SPRING_PROFILES_ACTIVE='mysql'; mvn -f backend spring-boot:run
services:
  mysql:
    image: mysql:8.0
    container_name: sems-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: sems_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
